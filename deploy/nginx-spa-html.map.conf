# Какой HTML отдавать для публичных SPA-маршрутов (уникальные title/description в статике).
map $uri $wm_spa_html {
    default /index.html;
    ~^/$ /home.html;
    ~^/login/?$ /login.html;
    ~^/faq/?$ /faq.html;
    ~^/legal/privacy/?$ /legal-privacy.html;
    ~^/legal/personal-data-consent/?$ /legal-personal-data-consent.html;
    ~^/legal/terms/?$ /legal-terms.html;
}
