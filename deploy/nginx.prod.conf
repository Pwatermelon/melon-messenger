map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS (+ ACME для продления certbot)
server {
    listen 80;
    server_name watermelon-messenger.ru www.watermelon-messenger.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://watermelon-messenger.ru$request_uri;
    }
}

# www → apex
server {
    listen 443 ssl http2;
    server_name www.watermelon-messenger.ru;

    ssl_certificate     /etc/letsencrypt/live/watermelon-messenger.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/watermelon-messenger.ru/privkey.pem;

    return 301 https://watermelon-messenger.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name watermelon-messenger.ru;

    ssl_certificate     /etc/letsencrypt/live/watermelon-messenger.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/watermelon-messenger.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        client_max_body_size 100M;
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    location /uploads/ {
        proxy_pass http://api:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://api:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
