# HTTP-only nginx for first Let's Encrypt certificate (no SSL yet).
# Mounted temporarily by scripts/certbot-init.sh

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name watermelon-messenger.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Watermelon Messenger — waiting for TLS certificate. Run certbot-init.sh';
        add_header Content-Type text/plain;
    }
}
