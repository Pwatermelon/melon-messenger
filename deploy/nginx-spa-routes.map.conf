# Маршруты SPA: только они отдают index.html (200). Остальные URL → HTTP 404.
map $uri $wm_spa_route {
    default 0;
    ~^/$ 1;
    ~^/login/?$ 1;
    ~^/auth/ 1;
    ~^/legal/ 1;
    ~^/faq/?$ 1;
    ~^/beta/ 1;
    ~^/icon/?$ 1;
    ~^/chat/ 1;
    ~^/settings/?$ 1;
    ~^/profile(/|$) 1;
    ~^/admin/?$ 1;
}
