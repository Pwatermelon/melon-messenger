services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: melon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  scylla:
    image: scylladb/scylla:6.0
    command: --smp 1 --memory 1G --overprovisioned 1
    ports:
      - "9042:9042"
    volumes:
      - scylladata:/var/lib/scylla

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/melon
      REDIS_URL: redis://redis:6379
      SCYLLA_CONTACT_POINTS: scylla
      SCYLLA_KEYSPACE: melon
      JWT_SECRET: watermelon-docker-secret
      PORT: "3000"
      WEB_URL: http://localhost:8080
      YANDEX_REDIRECT_URI: http://localhost:8080/api/auth/yandex/callback
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID:-}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET:-}
      YANDEX_NATIVE_REDIRECT_URI: ${YANDEX_NATIVE_REDIRECT_URI:-watermelon://oauth/yandex}
      ADMIN_YANDEX_IDS: ${ADMIN_YANDEX_IDS:-}
      ADMIN_YANDEX_LOGINS: ${ADMIN_YANDEX_LOGINS:-platinumwatermelon}
      MESSAGE_AT_REST_KEY: ${MESSAGE_AT_REST_KEY:-}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      PLATINUM_PRICE_RUB: ${PLATINUM_PRICE_RUB:-299}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8080/api}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@watermelon.local}
      E2E_TEST_SECRET: ${E2E_TEST_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      scylla:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # Без args — фронт ходит на тот же хост (/api, /ws), nginx проксирует на api
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
  scylladata:
